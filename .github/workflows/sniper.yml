name: MemeRunner AI Sniper Cycle

on:
  schedule:
    # Backstop trigger only — the job itself now loops internally for ~340
    # minutes (near GitHub's 360min hard max per job) polling every 1s, so in
    # steady state this cron rarely even gets to start a new run: the
    # concurrency group below queues at most one waiting run behind the
    # active one and starts it the moment the long-running job ends or dies.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # allows manual "Run workflow" trigger from the Actions tab

concurrency:
  group: memerunner-sniper
  cancel-in-progress: false # never cancel a mid-flight trade cycle

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    permissions:
      contents: write # needed to commit logs/ back to the repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sniper cycle (continuous ~340min loop, 1s exit polling)
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          SOLANA_PRIVATE_KEY_08: ${{ secrets.SOLANA_PRIVATE_KEY_08 }}
          SOLANA_PRIVATE_KEY_07: ${{ secrets.SOLANA_PRIVATE_KEY_07 }}
          DRY_RUN: "false"
          GH_SYNC_SECRET: ${{ secrets.GH_SYNC_SECRET }}
        run: node src/index.js

      - name: Commit updated logs
        run: |
          git config user.name "memerunner-bot"
          git config user.email "actions@github.com"
          git add logs/ || true
          git diff --cached --quiet || git commit -m "chore: update trade logs [skip ci]"
          git pull --rebase origin main || true
          git push || true
